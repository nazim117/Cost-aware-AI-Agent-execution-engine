server {
    listen 3000;

    location / {
        root   /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://agent-executor:8081/;
        proxy_set_header Host $host;
    }

    location /agent/ {
        proxy_pass http://agent-executor:8081/agent/;
        proxy_set_header Host $host;
    }
}