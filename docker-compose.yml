version: "3.8"

services:
  policy-engine:
    build:
      context: .
      dockerfile: services/_docker/go-service.Dockerfile
      args:
        SERVICE: policy-engine
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/_docker/go-service.Dockerfile
      args:
        SERVICE: gateway
    env_file:
      - ./services/gateway/.env
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - BLOCK_ON_PII=${BLOCK_ON_PII:-false}
      - AUDIT_LOG_PATH=/var/log/gateway/audit.jsonl
    volumes:
      - gateway-audit:/var/log/gateway
    restart: unless-stopped

  mcp-server:
    build:
      context: ./services/mcp-server
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
    restart: unless-stopped

  agent-executor:
    build:
      context: .
      dockerfile: services/_docker/go-service.Dockerfile
      args:
        SERVICE: agent-executor
    env_file:
      - ./services/gateway/.env
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - POLICY_ENGINE_URL=http://policy-engine:8080
      - GATEWAY_URL=http://gateway:8082
      - MCP_SERVER_URL=http://mcp-server:8083
    depends_on:
      - policy-engine
      - gateway
      - mcp-server
    restart: unless-stopped

#  agent-executor:
#    build:
#      context: ./services/agent-executor
#      dockerfile: Dockerfile
#    ports:
#      - "8081:8081"
#    environment:
#      - PORT=8081
#      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
#      - POLICY_ENGINE_URL=http://policy-engine:8080
#      - GATEWAY_URL=http://gateway:8082
#    depends_on:
#      - policy-engine
#      - gateway
#    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - agent-executor

volumes:
  gateway-audit:

networks:
  default:
    name: cost-aware-ai-net
    driver: bridge
