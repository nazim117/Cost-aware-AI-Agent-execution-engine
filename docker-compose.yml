services:
  policy-engine:
    build:
      context: .
      dockerfile: services/_docker/go-service.Dockerfile
      args:
        SERVICE: policy-engine
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: services/_docker/go-service.Dockerfile
      args:
        SERVICE: gateway
    env_file:
      - ./services/gateway/.env
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - BLOCK_ON_PII=${BLOCK_ON_PII:-false}
      - AUDIT_LOG_PATH=/var/log/gateway/audit.jsonl
    volumes:
      - gateway-audit:/var/log/gateway
    restart: unless-stopped

  mcp-server:
    build:
      context: ./services/mcp-server
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    # Load PM credentials from the repo-root .env so the chat-agent never
    # reads them directly.  JIRA_* and GITHUB_TOKEN stay on this service.
    env_file:
      - .env
    environment:
      - PORT=8083
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      # OpenTelemetry: export spans to Jaeger over OTLP/HTTP.
      # "jaeger" resolves to the Jaeger container on the shared network.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=mcp-server
    depends_on:
      - jaeger
    restart: unless-stopped

  agent-executor:
    build:
      context: .
      dockerfile: services/_docker/go-service.Dockerfile
      args:
        SERVICE: agent-executor
    env_file:
      - ./services/gateway/.env
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - POLICY_ENGINE_URL=http://policy-engine:8080
      - GATEWAY_URL=http://gateway:8082
      - MCP_SERVER_URL=http://mcp-server:8083
    depends_on:
      - policy-engine
      - gateway
      - mcp-server
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - agent-executor

  # chat-agent — personal AI agent service (Steps 1–4 of the build plan).
  # Runs on port 8084; persists conversation history in a named Docker volume.
  chat-agent:
    build: ./services/chat-agent
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      - PORT=8084
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # Store the SQLite file in the mounted volume so it survives restarts.
      - SQLITE_PATH=/data/chat.db
      # Inside Docker Compose, services find each other by service name.
      # "qdrant" resolves to the qdrant container on the shared network.
      - QDRANT_URL=http://qdrant:6333
      # Ollama runs on the host machine, not in Docker.
      # host.docker.internal is a special DNS name that Docker resolves to the
      # host machine's IP address from inside a container.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # PM I/O is routed through the mcp-server; chat-agent holds no vendor creds.
      - MCP_BASE_URL=http://mcp-server:8083
      # OpenTelemetry: export spans to Jaeger over OTLP/HTTP.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=chat-agent
    volumes:
      - chat-db:/data
    depends_on:
      - qdrant
      - mcp-server
      - jaeger
    restart: unless-stopped

  # jaeger — distributed tracing backend (local-first, all-in-one image).
  #
  # Receives spans from chat-agent and mcp-server over OTLP/HTTP on port 4318.
  # The web UI on port 16686 lets you view full request waterfalls:
  #   http://localhost:16686
  #
  # "all-in-one" bundles the collector, query service, and UI in one container —
  # exactly what we need for a local dev/solo setup.  No separate collector or
  # storage backend required.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"   # Jaeger web UI
      - "4318:4318"     # OTLP/HTTP ingest (what the services export to)
    environment:
      # Required to enable the OTLP receiver in Jaeger all-in-one.
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # qdrant — vector database for semantic memory (Step 2+).
  # Stores message embeddings and supports similarity search.
  qdrant:
    image: qdrant/qdrant:v1.13.1
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API (not used yet, but exposed for tooling)
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  gateway-audit:
  # Persists the SQLite database across container restarts.
  chat-db:
  # Persists Qdrant vector index across container restarts.
  qdrant-data:

networks:
  default:
    name: cost-aware-ai-net
    driver: bridge
