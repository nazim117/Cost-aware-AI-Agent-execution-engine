version: "3.8"

services:
  policy-engine:
    build:
      context: ./services/policy-engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - BLOCK_ON_PII=${BLOCK_ON_PII:-false}
      - AUDIT_LOG_PATH=/var/log/gateway/audit.jsonl
    volumes:
      - gateway-audit:/var/log/gateway
    restart: unless-stopped

  agent-executor:
    build:
      context: ./services/agent-executor
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - POLICY_ENGINE_URL=http://policy-engine:8080
      - GATEWAY_URL=http://gateway:8082
    depends_on:
      - policy-engine
      - gateway
    restart: unless-stopped

volumes:
  gateway-audit:

networks:
  default:
    name: cost-aware-ai-net
