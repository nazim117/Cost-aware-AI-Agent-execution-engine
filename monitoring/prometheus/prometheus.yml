global:
  scrape_interval: 15s   # How often to scrape targets.
  evaluation_interval: 15s

scrape_configs:
  # chat-agent — Python FastAPI service (port 8084, /metrics via prometheus-fastapi-instrumentator)
  # Exposes: http_request_duration_seconds, http_requests_total, chat_agent_llm_* counters
  - job_name: chat-agent
    static_configs:
      - targets: ["chat-agent:8084"]

  # mcp-server — Go service (port 8083, /metrics via prometheus/client_golang)
  # Exposes: mcp_server_tool_calls_total, mcp_server_tool_call_duration_seconds, Go runtime metrics
  - job_name: mcp-server
    static_configs:
      - targets: ["mcp-server:8083"]
