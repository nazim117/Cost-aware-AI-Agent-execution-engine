<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f9f9f9;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 12px 16px;
      background: #1a1a2e;
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    /* ── Transcript ── */
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 3px;
    }

    /* ── Status bar ── */
    #status {
      padding: 4px 16px;
      font-size: 12px;
      color: #666;
      min-height: 22px;
      flex-shrink: 0;
    }

    /* ── Use page button ── */
    #use-page-btn {
      margin: 0 16px 8px;
      padding: 8px 12px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #use-page-btn:hover {
      background: #e4e4e4;
    }

    #use-page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Input row ── */
    #input-row {
      display: flex;
      gap: 8px;
      padding: 8px 16px 12px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      resize: none;
    }

    #input:focus {
      border-color: #1a1a2e;
    }

    #send-btn {
      padding: 8px 16px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    #send-btn:hover {
      opacity: 0.85;
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>🤖 Chat Agent</header>

  <div id="transcript"></div>

  <div id="status"></div>

  <button id="use-page-btn">📄 Use current page as context</button>

  <div id="input-row">
    <input id="input" type="text" placeholder="Ask anything…" autocomplete="off" />
    <button id="send-btn">Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
