title = "gitleaks config"

# Extend the default ruleset rather than replacing it.
[extend]
useDefault = true

# No real credentials were ever committed to this repo.  The 115 historical
# findings gitleaks reports are false positives from:
#
#   1. The Python .venv directory accidentally committed in a22361f8 — package
#      metadata (RECORD files, .dat files) contains SHA256 hashes whose
#      base64url encoding starts with "sk-", matching API-key regexes.
#
#   2. .env.example / .env.example — placeholder text "sk-..." in comments.
#
#   3. SQLite binary chat.db committed alongside source changes.
#
# All three are suppressed below so CI is not permanently broken.

[[allowlists]]
description = "Python virtualenv accidentally committed — SHA256 hashes match API key pattern"
paths = [
  '''\.venv''',
  '''__pycache__''',
  '''\.pyc$''',
]

[[allowlists]]
description = "Example / template env files — placeholder values only, not real secrets"
paths = [
  '''\.env$''',
  '''\.env\.example''',
  '''example\.env''',
  '''example_env''',
]

[[allowlists]]
description = "SQLite database binary — not a secret source"
paths = [
  '''chat\.db''',
]
