name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Fridays at 14:20 UTC.
    - cron: '20 14 * * 5'

# Cancel superseded runs — CodeQL is the heaviest job in the pipeline.
concurrency:
  group: codeql-${{ github.ref }}-${{ matrix.language }}
  cancel-in-progress: true

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: go
            # autobuild works for the go.work workspace. If it ever fails with
            # "unable to automatically build", switch to build-mode: manual and
            # add explicit `go build ./...` steps per module below.
            build-mode: autobuild
          - language: actions
            # Analyzes the workflow YAML files themselves.
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended adds more CWE coverage; security-and-quality
          # adds code-quality rules on top. Both are free for public repos.
          queries: security-extended,security-and-quality

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo 'Switch build-mode back to autobuild, or add explicit build'
          echo 'commands here (e.g. go build ./... per module).'
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
