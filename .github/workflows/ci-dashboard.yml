name: CI - Dashboard

on:
  push:
    branches: [ "main" ]
    paths:
      - 'dashboard/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'dashboard/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: 'dashboard/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 7
