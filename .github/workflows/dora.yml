name: DORA Metrics

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # run manually any time

permissions:
  contents: read
  issues: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for lead-time calculation

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute DORA metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python dora_metrics.py | tee /tmp/dora.txt
          {
            echo '## DORA Metrics'
            echo '```'
            cat /tmp/dora.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
