name: CI - Chat Agent

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/chat-agent/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/chat-agent/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'services/chat-agent/requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        env:
          DEEPSEEK_API_KEY: dummy-key-for-ci
        run: pytest tests/ -v -m "not integration and not e2e"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chat-agent:ci services/chat-agent
